<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>FAQ 常見問題</title>
    <style>
        body { font-family: sans-serif; background: #f9f9f9; display: flex; justify-content: center; padding: 20px; }
        .container { width: 375px; background: white; border-radius: 20px; overflow: hidden; box-shadow: 0 4px 10px rgba(0,0,0,0.1); }
        .header { background: #ff4d4d; color: white; text-align: center; padding: 15px; font-weight: bold; }
        .menu-item { background: #eee; margin: 10px; padding: 12px; border-radius: 25px; text-align: center; cursor: pointer; transition: 0.3s; }
        .menu-item:hover { background: #ddd; }
        .content-box { margin: 15px; background: #e0e0e0; height: 300px; border-radius: 15px; padding: 20px; display: none; }
        .active { display: block; }
    </style>
</head>
<body>
    <div class="container">
        <div class="header" id="title">常見問題</div>
        <div id="main-menu">
            <div class="menu-item" onclick="showContent('出貨時間')">出貨時間</div>
            <div class="menu-item" onclick="showContent('訂單問題')">訂單問題</div>
            <div class="menu-item" onclick="showContent('預購說明')">預購說明</div>
            <div class="menu-item" onclick="showContent('退換貨政策')">退換貨政策</div>
        </div>
        <div id="content" class="content-box">這裡填寫具體內容...</div>
    </div>

    <script>
        function showContent(name) {
            document.getElementById('title').innerText = name;
            document.getElementById('main-menu').style.display = 'none';
            document.getElementById('content').classList.add('active');
        }
    </script>
</body>
</html>
